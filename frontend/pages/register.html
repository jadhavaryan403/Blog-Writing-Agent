<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — AI Blog Platform</title>
  <link rel="stylesheet" href="../static/css/main.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-icon">
          <svg width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
          </svg>
        </div>
        <h2 style="color:var(--text-primary);margin-bottom:4px">Create your account</h2>
        <p style="font-size:.85rem;color:var(--text-muted)">Start generating AI-powered blogs</p>
      </div>

      <form id="register-form">
        <div class="form-group">
          <label for="name">Full name</label>
          <input type="text" id="name" placeholder="Jane Doe" required autocomplete="name" />
        </div>
        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="password">Password <span style="color:var(--text-muted);font-size:.8rem">(min 8 chars)</span></label>
          <input type="password" id="password" placeholder="••••••••" required minlength="8" autocomplete="new-password" />
        </div>
        <div class="form-group">
          <label for="confirm">Confirm password</label>
          <input type="password" id="confirm" placeholder="••••••••" required autocomplete="new-password" />
        </div>
        <button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center;margin-top:8px" id="submit-btn">
          Create account
        </button>
      </form>

      <p style="text-align:center;margin-top:20px;font-size:.85rem;color:var(--text-muted)">
        Already have an account?
        <a href="login.html">Sign in</a>
      </p>
    </div>
  </div>

  <script src="../static/js/api.js"></script>
  <script>
    if (Auth.isLoggedIn()) window.location.href = 'dashboard.html';

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;

      if (password !== confirm) {
        Toast.error('Passwords do not match');
        return;
      }

      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Creating account…';

      try {
        await API.register({
          name:     document.getElementById('name').value.trim(),
          email:    document.getElementById('email').value.trim(),
          password,
        });
        Toast.success('Account created! Signing you in…');

        // Auto-login after register
        const tokens = await API.login({
          email:    document.getElementById('email').value.trim(),
          password,
        });
        Auth.save(tokens);
        setTimeout(() => window.location.href = 'dashboard.html', 700);
      } catch (err) {
        Toast.error(err.message);
        btn.disabled = false;
        btn.textContent = 'Create account';
      }
    });
  </script>
</body>
</html>
